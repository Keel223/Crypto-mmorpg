<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Realm of Crypto (Text MMO)</title>
    <style>
        :root { --bg: #0f0f0f; --panel: #1a1a1a; --border: #333; --gold: #f1c40f; --hp: #c0392b; --mana: #2980b9; --success: #27ae60; --text: #ecf0f1; }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .game-container { max-width: 1000px; width: 100%; display: grid; grid-template-columns: 250px 1fr; gap: 20px; }
        h1, h2, h3 { margin: 0 0 10px 0; color: var(--gold); text-transform: uppercase; font-size: 14px; letter-spacing: 1px; }
        .panel { background: var(--panel); border: 1px solid var(--border); padding: 15px; border-radius: 5px; }
        
        /* Левая колонка (Статы) */
        .sidebar { display: flex; flex-direction: column; gap: 15px; }
        .stat-bar { background: #000; height: 12px; border-radius: 6px; overflow: hidden; margin-bottom: 5px; position: relative; }
        .stat-bar-fill { height: 100%; transition: width 0.3s; }
        .hp-fill { background: var(--hp); }
        .xp-fill { background: var(--mana); }
        .stat-text { font-size: 12px; display: flex; justify-content: space-between; margin-bottom: 2px; }
        .equip-slot { background: #000; padding: 10px; margin-top: 5px; min-height: 40px; border: 1px dashed #444; border-radius: 3px; color: #888; }

        /* Правая колонка */
        .main-content { display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 15px; background: #111; border: 1px solid #333; border-radius: 5px; min-height: 150px; max-height: 200px; overflow-y: auto; font-size: 14px; line-height: 1.5; }
        .actions { display: flex; gap: 10px; }
        .actions button { flex: 1; padding: 10px; border: none; cursor: pointer; font-weight: bold; border-radius: 3px; text-transform: uppercase; }
        .btn-forest { background: #27ae60; color: white; } .btn-dungeon { background: #8e44ad; color: white; }
        .btn-rest { background: #f39c12; color: black; }
        
        .row { display: flex; gap: 15px; } .col { flex: 1; }
        .item { background: #222; border: 1px solid #444; padding: 8px; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center; font-size: 13px; border-radius: 3px;}
        .market-item { border-left: 3px solid var(--success); }
        .item small { color: #888; }
        
        button { background: #444; color: white; border: none; padding: 5px 8px; cursor: pointer; border-radius: 3px; font-size: 12px; }
        button:hover { opacity: 0.8; }
        .btn-sm { font-size: 11px; padding: 3px 6px; }
        .hidden { display: none; }

        /* Экран авторизации */
        .auth-container { max-width: 350px; margin: 100px auto; }
        .auth-container input { width: 100%; padding: 10px; margin-bottom: 10px; background: #222; border: 1px solid #333; color: white; }
        .auth-btn { width: 100%; padding: 12px !important; background: var(--gold) !important; color: #000 !important; font-weight: bold; }
    </style>
</head>
<body>

<!-- АВТОРИЗАЦИЯ -->
<div id="authScreen" class="auth-container panel">
    <h2 style="text-align:center; font-size:20px; margin-bottom:20px;">REALM OF CRYPTO</h2>
    <div id="authError" style="color:var(--hp); font-size:12px; margin-bottom:10px; display:none;"></div>
    <input type="text" id="authUser" placeholder="Логин">
    <input type="password" id="authPass" placeholder="Пароль">
    <button class="auth-btn" onclick="register()">ЗАРЕГИСТРИРОВАТЬСЯ</button>
    <button class="auth-btn" style="background:#333 !important; color:white !important; margin-top:5px;" onclick="login()">ВХОД</button>
</div>

<!-- ИГРА -->
<div id="gameScreen" class="game-container hidden">
    
    <!-- Сайдбар -->
    <div class="sidebar">
        <div class="panel">
            <h2>Персонаж</h2>
            <div id="charName" style="font-weight:bold; font-size:16px; margin-bottom:10px;">Hero</div>
            <div class="stat-text"><span>Уровень <span id="lvl">1</span></span><span id="xpText">0/100 XP</span></div>
            <div class="stat-bar"><div id="xpBar" class="stat-bar-fill xp-fill" style="width: 0%"></div></div>
            
            <div class="stat-text" style="margin-top:10px;"><span>❤️ Здоровье</span><span id="hpText">100/100</span></div>
            <div class="stat-bar"><div id="hpBar" class="stat-bar-fill hp-fill" style="width: 100%"></div></div>
            
            <div style="margin-top:15px; font-size:20px; color:var(--gold);">💰 <span id="goldDisplay">0</span></div>
        </div>

        <div class="panel">
            <h2>Экипировка</h2>
            <div class="equip-slot" id="equipSlot">Пусто (голые кулаки)</div>
        </div>

        <div class="panel">
            <h2>Финансы</h2>
            <input type="email" id="fpEmail" placeholder="FaucetPay Email" style="width:100%; padding:5px; margin-bottom:5px; background:#000; border:1px solid #333; color:white;">
            <input type="number" id="withdrawAmount" placeholder="Сумма 💰 (мин 1000)" style="width:100%; padding:5px; margin-bottom:5px; background:#000; border:1px solid #333; color:white;">
            <button class="btn-sm" style="width:100%; padding:8px; background:var(--success);" onclick="withdraw()">Вывести USDT</button>
        </div>
    </div>

    <!-- Основная область -->
    <div class="main-content">
        <div class="panel msg" id="gameLog">
            Добро пожаловать в мир, где крипта решает всё. Идите в лес, чтобы заработать на первый меч...
        </div>

        <div class="actions">
            <button class="btn-forest" onclick="fight('forest')">🌲 Тёмный Лес</button>
            <button class="btn-dungeon" onclick="fight('dungeon')">💀 Кристальная Пещера</button>
            <button class="btn-rest" onclick="rest()">🍺 Отдохнуть (Лечение)</button>
        </div>

        <div class="row">
            <div class="col panel">
                <h3>🎒 Инвентарь</h3>
                <div id="inventoryList"></div>
            </div>
            <div class="col panel">
                <h3>🏪 P2P Рынок</h3>
                <div id="marketList"></div>
            </div>
        </div>
    </div>
</div>

<script>
    let currentUser = '';
    let userData = {};
    let marketData = [];
    const API = '/api';

    async function req(url, body = {}) {
        const res = await fetch(API + url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: currentUser, ...body })
        });
        return res.json();
    }

    function showAuthError(msg) {
        const el = document.getElementById('authError');
        el.innerText = msg; el.style.display = 'block';
    }

    async function register() {
        const u = document.getElementById('authUser').value;
        const p = document.getElementById('authPass').value;
        const data = await req('/register', { username: u, password: p });
        if(data.error) return showAuthError(data.error);
        showAuthError(''); // Пустая ошибка - зеленый сигнал
        await login(); // Сразу логиним после реги
    }

    async function login() {
        const u = document.getElementById('authUser').value;
        const p = document.getElementById('authPass').value;
        const data = await req('/login', { username: u, password: p });
        if(data.error) return showAuthError(data.error);
        
        currentUser = u;
        userData = data.user;
        document.getElementById('authScreen').classList.add('hidden');
        document.getElementById('gameScreen').classList.remove('hidden');
        sync();
    }

    async function sync() {
        const data = await req('/sync');
        userData = data.user;
        marketData = data.market;
        render();
    }

    function addLog(text) {
        const log = document.getElementById('gameLog');
        log.innerHTML = text + '<br><br>' + log.innerHTML; // Новые сообщения сверху
    }

    async function fight(location) {
        addLog(`<i>Идете в локацию...</i>`);
        const data = await req('/fight', { location });
        if(data.error) return addLog(`<span style="color:var(--hp)">${data.error}</span>`);
        addLog(data.log);
        userData = data.user;
        render();
    }

    async function rest() {
        const data = await req('/rest');
        if(data.error) return addLog(`<span style="color:var(--hp)">${data.error}</span>`);
        addLog(data.message);
        userData = data.user;
        render();
    }

    async function equipItem(itemId) {
        const data = await req('/equip', { itemId });
        if(data.error) return addLog(data.error);
        addLog(data.message);
        userData = data.user;
        render();
    }

    async function sellItem(itemId) {
        const price = prompt("Введите цену в золоте:");
        if (!price || price <= 0) return;
        const data = await req('/market/sell', { itemId, price: parseInt(price) });
        if(data.error) return addLog(data.error);
        addLog(data.message);
        userData = data.user; marketData = data.market;
        render();
    }

    async function buyItem(lotId) {
        const data = await req('/market/buy', { lotId });
        if(data.error) return addLog(`<span style="color:var(--hp)">${data.error}</span>`);
        addLog(data.message);
        userData = data.user; marketData = data.market;
        render();
    }

    async function withdraw() {
        const email = document.getElementById('fpEmail').value;
        const amount = parseInt(document.getElementById('withdrawAmount').value);
        if(!email || !amount) return addLog("Заполните поля вывода");
        
        addLog("<i>Отправка запроса на FaucetPay...</i>");
        const data = await req('/withdraw', { email, amountGold: amount });
        if(data.error) return addLog(`<span style="color:var(--hp)">${data.error}</span>`);
        addLog(data.message);
        userData = data.user;
        render();
    }

    function render() {
        document.getElementById('charName').innerText = currentUser;
        document.getElementById('lvl').innerText = userData.level;
        document.getElementById('goldDisplay').innerText = userData.gold;

        // Полоски
        const maxHp = userData.maxHp;
        document.getElementById('hpText').innerText = `${userData.hp}/${maxHp}`;
        document.getElementById('hpBar').style.width = `${(userData.hp/maxHp)*100}%`;

        const xpNeeded = userData.level * 100;
        document.getElementById('xpText').innerText = `${userData.xp}/${xpNeeded} XP`;
        document.getElementById('xpBar').style.width = `${(userData.xp/xpNeeded)*100}%`;

        // Экипировка
        const slot = document.getElementById('equipSlot');
        if (userData.equipped) {
            const wp = userData.inventory.find(i => i.id === userData.equipped);
            if(wp) slot.innerHTML = `⚔️ ${wp.name} <br><small style="color:var(--gold)">Урон: +${wp.power}</small>`;
        } else {
            slot.innerHTML = "Пусто (урон: 10)";
        }

        // Инвентарь
        const invEl = document.getElementById('inventoryList');
        invEl.innerHTML = userData.inventory.length === 0 ? '<div style="color:#666; font-size:12px;">Пусто</div>' :
            userData.inventory.map(i => `
                <div class="item">
                    <div>⚔️ ${i.name} <br><small style="color:var(--gold)">Сила: +${i.power}</small></div>
                    <div>
                        ${i.type === 'weapon' ? `<button class="btn-sm" style="background:#3498db; margin-right:3px;" onclick="equipItem(${i.id})">[Надеть]</button>` : ''}
                        <button class="btn-sm" style="background:var(--hp);" onclick="sellItem(${i.id})">[Продать]</button>
                    </div>
                </div>
            `).join('');

        // Рынок
        const markEl = document.getElementById('marketList');
        markEl.innerHTML = marketData.length === 0 ? '<div style="color:#666; font-size:12px;">Рынок пуст</div>' :
            marketData.map(m => `
                <div class="item market-item">
                    <div>
                        ⚔️ ${m.item.name} <br>
                        <small style="color:var(--gold)">Сила: +${m.item.power} | Цена: ${m.price} 💰</small><br>
                        <small style="color:#888;">Продавец: ${m.seller}</small>
                    </div>
                    ${m.seller !== currentUser ? `<button class="btn-sm" style="background:var(--success);" onclick="buyItem(${m.id})">Купить</button>` : ''}
                </div>
            `).join('');
    }
</script>
</body>
</html>
