<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoMMO</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: monospace; background: #111; color: #eee; }
        body { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        #auth { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111; display: flex; align-items: center; justify-content: center; z-index: 99; }
        .box { background: #222; padding: 30px; border-radius: 10px; width: 300px; text-align: center; }
        .box h2 { color: #0f0; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #333; border: 1px solid #555; color: #fff; border-radius: 5px; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #0f0; color: #000; border: none; font-weight: bold; font-size: 16px; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        button:disabled { background: #555; color: #888; cursor: wait; }
        
        #game { display: none; height: 100vh; flex-direction: column; }
        .top { background: #222; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #444; }
        .top span { font-size: 14px; color: #ffd700; font-weight: bold; }
        .logout { background: none; border: 1px solid #f00; color: #f00; padding: 5px 10px; border-radius: 3px; cursor: pointer; font-size: 12px; }
        
        .content { flex: 1; padding: 20px; overflow-y: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax 150px, 1fr)); gap: 10px; margin-top: 20px; }
        .card { background: #222; border: 1px solid #444; padding: 15px; border-radius: 5px; text-align: center; cursor: pointer; }
        .card:hover { border-color: #0f0; }
        .card h3 { font-size: 14px; margin-bottom: 5px; }
        .card p { font-size: 11px; color: #888; }
        
        .log { background: #000; border: 1px solid #333; height: 200px; margin-top: 20px; padding: 10px; border-radius: 5px; overflow-y: auto; font-size: 13px; color: #888; white-space: pre-wrap; }
        .loot { color: #ffd700; } .dmg { color: #f00; } .sys { color: #0ff; }
        
        #inv, #market, #pay { display: none; }
        .inv-item { display: flex; justify-content: space-between; align-items: center; background: #222; border: 1px solid #333; padding: 10px; margin-bottom: 5px; border-radius: 5px; }
        .sell-btn { background: none; border: 1px solid #ffd700; color: #ffd700; padding: 5px 10px; border-radius: 3px; cursor: pointer; font-size: 12px; }
        .buy-btn { background: none; border: 1px solid #0f0; color: #0f0; padding: 5px 10px; border-radius: 3px; cursor: pointer; font-size: 12px; }
        
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; }
        #modal.active { display: flex; }
        .modal-box { background: #222; padding: 20px; border-radius: 5px; border: 1px solid #444; width: 250px; text-align: center; }
        .modal-box input { margin: 10px 0; }

        .toast { position: fixed; top: 10px; right: 10px; padding: 10px; background: #d32f2f; color: #fff; border-radius: 5px; font-size: 13px; z-index: 999; }
    </style>
</head>
<body>

    <div id="auth">
        <div class="box">
            <h2>CRYPTO REALM</h2>
            <input type="email" id="email" placeholder="Email от FaucetPay">
            <button id="loginBtn" onclick="startGame()">ВОЙТИ</button>
        </div>
    </div>

    <div id="game">
        <div class="top">
            <div>
                <span id="sLvl">LVL 1</span> | 
                <span id="sHp">HP 100/100</span> | 
                <span id="sGold">GOLD 0</span>
            </div>
            <button class="logout" onclick="location.reload()">EXIT</button>
        </div>

        <div class="content">
            <div id="map">
                <h2 id="locName">TAVERN</h2>
                <div id="moveGrid" class="grid">
                    <div class="card" onclick="goTo('forest')"><h3>FOREST</h3><p>Gobs, Wolves</p></div>
                    <div class="card" onclick="goTo('cave')"><h3>CAVE</h3><p>Skeletons</p></div>
                    <div class="card" onclick="goTo('swamp')"><h3>SWAMP</h3><p>Zombies</p></div>
                    <div class="card" onclick="goTo('necropolis')"><h3>NECROPOLIS</h3><p>Liches</p></div>
                    <div class="card" onclick="goTo('castle')"><h3>CASTLE</h3><p>Demons</p></div>
                    <div class="card" onclick="doAct('rest')" style="border-color:#0f0"><h3 style="color:#0f0">REST</h3><p>Heal HP</p></div>
                </div>
                <div id="fightBtn" style="display:none; margin-top:20px;">
                    <button style="width:100%; padding:15px; font-size:18px;" onclick="doAct('search')">⚔️ ATTACK</button>
                </div>
                <div class="log" id="log">Waiting...</div>
            </div>

            <div id="inv">
                <h2>INVENTORY</h2>
                <div id="invList"></div>
            </div>

            <div id="market">
                <h2>P2P MARKET</h2>
                <div id="marketList"></div>
            </div>

            <div id="pay">
                <div class="box" style="margin: 0 auto; max-width: 300px; text-align: left;">
                    <h2 style="text-align:center">WITHDRAW</h2>
                    <input type="number" id="wdAmount" placeholder="Amount Gold">
                    <button style="background:#f00; color:#fff;" onclick="alert('Ready to API')">ВЫВЕСТИ SATOSHI</button>
                </div>
            </div>
        </div>
    </div>

    <div id="modal">
        <div class="modal-box">
            <h3>SELL ITEM</h3>
            <p id="sellName"></p>
            <input type="number" id="sellPrice" placeholder="Price">
            <button style="background:#ffd700; color:#000;" onclick="confirmSell()">SELL</button>
            <button style="background:#555; color:#fff; margin-top:5px;" onclick="closeModal()">CANCEL</button>
        </div>
    </div>

<script>
let U = null; // User data
let sellId = null; 
const API = "/api";

function show(id) { document.getElementById('map').style.display='none'; document.getElementById('inv').style.display='none'; document.getElementById('market').style.display='none'; document.getElementById('pay').style.display='none'; document.getElementById(id).style.display='block'; }
function toast(msg) { let d = document.createElement('div'); d.className='toast'; d.innerText=msg; document.body.appendChild(d); setTimeout(()=>d.remove(), 3000); }

async function startGame() {
    let e = document.getElementById("email").value;
    if(!e.includes("@")) return toast("Wrong email");
    
    let btn = document.getElementById("loginBtn");
    btn.disabled = true; btn.innerText = "LOADING...";

    try {
        let r = await fetch(API+"/login", { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({email: e})});
        
        // БЕЗОПАСНОЕ ЧТЕНИЕ ОТВЕТА (НЕ СЛОМАЕТСЯ НИКОГДА)
        let txt = await r.text();
        let data;
        try { data = JSON.parse(txt); } catch(e) { toast("Vercel Error: " + txt.substring(0, 50)); btn.disabled = false; btn.innerText="ВОЙТИ"; return; }
        
        if (data.e) {
            toast(data.msg || data.e);
            btn.disabled = false; btn.innerText="ВОЙТИ";
            return;
        }
        
        U = data;
        document.getElementById("auth").style.display = "none";
        document.getElementById("game").style.display = "flex";
        document.getElementById("log").innerHTML = "System: Welcome!\n";
        updUI();
        show('map');
    } catch(err) {
        toast("Network Error");
        btn.disabled = false; btn.innerText="ВОЙТИ";
    }
}

function updUI() {
    if(!U) return;
    document.getElementById("sLvl").innerText = "LVL " + U.lvl;
    document.getElementById("sHp").innerText = "HP " + U.hp + "/" + U.maxHp;
    document.getElementById("sGold").innerText = "GOLD " + U.gold;
}

async function goTo(loc) {
    await fetch(API+"/action", { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({username: U.username, action: "move", target: loc})});
    document.getElementById("locName").innerText = loc.toUpperCase();
    document.getElementById("moveGrid").style.display = loc === "city" ? "grid" : "none";
    document.getElementById("fightBtn").style.display = loc === "city" ? "none" : "block";
    addLog("Moved to " + loc, "sys");
}

async function doAct(act) {
    let r = await fetch(API+"/action", { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({username: U.username, action: act})});
    let txt = await r.text();
    let data;
    try { data = JSON.parse(txt); } catch(e) { addLog("Server error", "dmg"); return; }

    if (data.e) {
        if(data.e === "DEAD") { document.getElementById("locName").innerText="TAVERN"; document.getElementById("moveGrid").style.display="grid"; document.getElementById("fightBtn").style.display="none"; }
        addLog(data.e, "dmg"); 
        updUI(); 
        return; 
    }
    
    updUI();
    let m = data.log;
    if (m === "MOVE") m = "Moved.";
    else if (m === "HEAL") m = "Fully Healed!";
    else if (m === "SAFE") m = "Safe zone.";
    else if (m === "DIED") m = "You died! Respawned.";
    else if (m.includes("HIT") && m.includes("KILL")) m = "Enemy Killed! +" + m.split("+")[1] + " EXP";
    else if (m.includes("LOOT:")) m = "Loot: " + m.split(":")[1];
    else m = "Battle...";
    
    addLog(m, data.type);
}

function addLog(t, c) { let l = document.getElementById("log"); l.innerHTML += "<span class=" + c + "> > " + t + "</span>\n"; l.scrollTop = l.scrollHeight; }

// INVENTORY
async function loadInv() {
    let r = await fetch(API+"/inv/" + U.username).then(r => r.text());
    let data = JSON.parse(r);
    let h = ""; 
    if(data.length === 0) h = "<p style='color:#888'>Empty</p>";
    data.forEach(i => { h += "<div class='inv-item'><span>" + i.name + "</span><button class='sell-btn' onclick='openSell(" + i.id + ", \"" + i.name + "\")'>SELL P2P</button></div>"; });
    document.getElementById("invList").innerHTML = h;
}

function openSell(id, name) { sellId = id; document.getElementById("sellName").innerText = name; document.getElementById("modal").classList.add("active"); }
function closeModal() { document.getElementById("modal").classList.remove("active"); }

async function confirmSell() {
    let p = parseInt(document.getElementById("sellPrice").value);
    if(!p) return toast("Enter price");
    await fetch(API+"/market/sell", { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({username: U.username, itemId: sellId, price: p})});
    closeModal(); loadInv(); toast("On market!");
}

// MARKET
async function loadMarket() {
    let r = await fetch(API+"/market").then(r => r.text());
    let data = JSON.parse(r);
    let h = "";
    if(data.length === 0) h = "<p style='color:#888'>Empty market.</p>";
    data.forEach(i => {
        let isMe = i.seller === U.username;
        h += "<div class='inv-item'><span>" + i.itemName + " (" + i.price + "G)</span>" + (isMe ? "<span style='color:#888'>YOUR LOT</span>" : "<button class='buy-btn' onclick='buyItem(" + i.id + ")'>BUY</button>") + "</div>";
    });
    document.getElementById("marketList").innerHTML = h;
}

async function buyItem(id) {
    let r = await fetch(API+"/market/buy", { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({username: U.username, lotId: id})});
    let data = JSON.parse(await r.text());
    if(data.e) return toast(data.e);
    toast("Bought!");
    loadMarket(); updUI();
}
</script>
</body>
</html>
