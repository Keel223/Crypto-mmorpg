<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест API</title>
    <style>
        body { background: #111; color: #fff; font-family: monospace; padding: 20px; }
        button { padding: 15px 30px; font-size: 20px; background: #00ff9d; color: #000; border: none; cursor: pointer; margin-top: 20px; font-weight: bold;}
        #result { margin-top: 20px; padding: 15px; background: #222; border: 1px solid #444; white-space: pre-wrap; word-wrap: break-word; }
        .err { color: #ff4d6d; } .ok { color: #00ff9d; }
    </style>
</head>
<body>

    <h2>ДИГНОСТИКА ВЕРСЕЛА</h2>
    <p>Адрес, к которому обращаемся: <strong id="apiUrl" style="color:#ffd700"></strong></p>
    
    <button onclick="testPing()">1. ПИНГ СЕРВЕРА (/api)</button><br><br>
    <button onclick="testLogin()">2. ТЕСТ РЕГИСТРАЦИИ (/api/register)</button>

    <div id="result">Жди нажатия...</div>

<script>
    // Версел всегда должен перенаправлять на текущий домен
    const API = '/api';
    document.getElementById('apiUrl').innerText = window.location.origin + API;

    async function testPing() {
        const res = document.getElementById('result');
        res.innerHTML = 'Отправка запроса...';
        try {
            const response = await fetch(API);
            res.innerHTML = `<span class="ok">УСПЕХ!</span>\nСтатус: ${response.status}\nТекст: ${await response.text()}`;
            if(response.status === 404) {
                res.innerHTML += '\n\nОШИБКА 404: Сервер работает, но не нашел файл api/index.js. Проверь название папки!';
            }
        } catch (e) {
            res.innerHTML = `<span class="err">КРИТИЧЕСКАЯ ОШИБКА СВЯЗИ</span>\n\n${e.message}\n\nЕсли тут написано "Failed to fetch" или "CORS", значит Vercel вообще не видит твою папку api.`;
        }
    }

    async function testLogin() {
        const res = document.getElementById('result');
        res.innerHTML = 'Отправка логина...';
        try {
            const response = await fetch(`${API}/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: 'test_user', password: '123' })
            });
            const data = await response.json();
            
            if(data.error) {
                res.innerHTML = `<span class="ok">СВЯЗЬ ЕСТЬ!</span>\nСервер ответил: "${data.error}" (Это нормально, значит логика работает)`;
            } else {
                res.innerHTML = `<span class="ok">УСПЕХ!</span>\nСервер зарегистрировал тестовый аккаунт. Ответ: ${JSON.stringify(data)}`;
            }
        } catch (e) {
            res.innerHTML = `<span class="err">ОШИБКА</span>\n${e.message}`;
        }
    }
</script>
</body>
</html>
